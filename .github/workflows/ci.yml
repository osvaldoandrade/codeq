name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 1.26.x
          cache: true
      - run: go vet ./...
      - run: go build ./...

  test:
    name: test (warn-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 1.26.x
          cache: true
      - name: Unit tests with race detector
        continue-on-error: true
        run: |
          go test -race -shuffle=on -count=1 -timeout=15m \
            -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  lint:
    name: lint (warn-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 1.26.x
          cache: true
      - uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        with:
          version: v2.12.2
          args: --timeout=5m

  coverage:
    name: coverage (warn-only)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 1.26.x
          cache: true
      - name: Download coverage profile
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage
      - name: Enforce coverage thresholds
        if: hashFiles('coverage.out') != ''
        continue-on-error: true
        run: |
          go install github.com/vladopajic/go-test-coverage/v2@v2.11.4
          go-test-coverage --config .testcoverage.yml

  vulncheck:
    name: vulncheck (warn-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 1.26.x
          cache: true
      - name: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gosec:
    name: gosec (warn-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 1.26.x
          cache: true
      - name: gosec
        continue-on-error: true
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.28.0
          gosec -quiet -severity=medium -confidence=medium ./...
