name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BIN_NAME: codeq
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        # Only test/build the CLI so the release pipeline doesn't depend on any private server-side modules.
        run: go test ./cmd/codeq/...

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              ext=""
              if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
              echo "Building $GOOS/$GOARCH"
              CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
                go build -trimpath -ldflags "-s -w" \
                -o "dist/${BIN_NAME}-${GOOS}-${GOARCH}${ext}" \
                ./cmd/codeq
            done
          done

      - name: Checksums
        shell: bash
        run: |
          set -euo pipefail
          shasum -a 256 dist/* > dist/SHA256SUMS.txt

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/*

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm package (npmjs)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Missing secret NPM_TOKEN (required to publish to registry.npmjs.org)." >&2
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          cd npm
          npm version --no-git-tag-version "$VERSION"
          npm pack --dry-run
          npm publish --access public --provenance

      - name: Smoke test npm install
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          PREFIX="${RUNNER_TEMP}/codeq-npm-smoke"

          for attempt in {1..12}; do
            if npm view "@osvaldoandrade/codeq@${VERSION}" version >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Package @osvaldoandrade/codeq@${VERSION} was not visible on npm after waiting." >&2
              exit 1
            fi
            sleep 10
          done

          npm install --global --prefix "$PREFIX" "@osvaldoandrade/codeq@${VERSION}"
          "$PREFIX/bin/codeq" --help

  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/codeq-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Compute version
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          echo "version=${VERSION}" >>"$GITHUB_OUTPUT"
          echo "image_lower=${REGISTRY}/${IMAGE_NAME,,}" >>"$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push codeq-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ${{ steps.vars.outputs.image_lower }}:${{ steps.vars.outputs.version }}
            ${{ steps.vars.outputs.image_lower }}:${{ env.RELEASE_TAG }}
            ${{ steps.vars.outputs.image_lower }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}

      - name: Ensure package is public (best-effort)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GHCR_ADMIN_TOKEN }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Skipping: secret GHCR_ADMIN_TOKEN is not set."
            echo "To auto-publish ghcr.io/${IMAGE_NAME,,} as public, create a PAT with admin:packages and store it as GHCR_ADMIN_TOKEN."
            exit 0
          fi
          gh api -X PATCH \
            "/user/packages/container/codeq-service" \
            -f visibility=public
