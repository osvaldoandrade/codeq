name: Test Coverage

on:
  push:
    branches:
      - main
      - copilot/**
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.go-version'
      - '.github/workflows/test-coverage.yml'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.go-version'
      - '.github/workflows/test-coverage.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: .go-version

      - name: Run Tests with Coverage
        run: |
          # Test only packages without private dependencies
          go test -v -coverprofile=coverage.out -covermode=atomic \
            ./internal/backoff \
            ./internal/repository \
            ./internal/services \
            ./pkg/domain \
            ./pkg/config

      - name: Generate Coverage Report
        run: |
          go tool cover -func=coverage.out > coverage-report.txt
          echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -20 coverage-report.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          # Extract total coverage
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Coverage: $COVERAGE**" >> $GITHUB_STEP_SUMMARY

          # Check if coverage meets threshold
          COVERAGE_NUM=${COVERAGE%%%}
          awk -v actual="$COVERAGE_NUM" 'BEGIN { exit !(actual >= 62.0) }'
          echo "Coverage threshold met (at least 62.0%)" >> $GITHUB_STEP_SUMMARY

      - name: Upload Coverage to GitHub
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage-report.txt
          retention-days: 30

      - name: Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          echo "Coverage: $COVERAGE"
          # You can add a badge generation tool here if desired
