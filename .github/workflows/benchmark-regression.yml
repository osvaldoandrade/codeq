name: Benchmark Regression Testing

on:
  push:
    branches:
      - main
      - copilot/**
    paths:
      - '**.go'
      - 'internal/bench/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/benchmark-regression.yml'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'internal/bench/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/benchmark-regression.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run Go Benchmarks
        run: |
          echo "=== Running Performance Benchmarks ==="
          go test -bench=. -benchmem -benchtime=10s -count=3 ./internal/bench > benchmark-results.txt 2>&1
          cat benchmark-results.txt

      - name: Run Bloom Filter Benchmarks
        run: |
          echo "=== Running Bloom Filter Benchmarks ==="
          go test -bench=BenchmarkBloom -run='^$' -benchmem -benchtime=10s -count=3 ./internal/repository > bloom-results.txt 2>&1
          cat bloom-results.txt

      - name: Store benchmark results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .benchmark-history
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          cp benchmark-results.txt ".benchmark-history/bench_${TIMESTAMP}.txt"

      - name: Parse benchmark output
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat benchmark-results.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f bloom-results.txt ]; then
            echo "## Bloom Filter Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat bloom-results.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Extract key metrics for summary
          echo "### Key Metrics" >> $GITHUB_STEP_SUMMARY
          echo "Benchmarks completed on $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

          # Parse HTTP benchmark result
          HTTP_RESULT=$(grep "BenchmarkHTTP_CreateClaimComplete" benchmark-results.txt | head -1)
          if [ -n "$HTTP_RESULT" ]; then
            echo "- **HTTP Create→Claim→Complete**: $HTTP_RESULT" >> $GITHUB_STEP_SUMMARY
          fi

          # Parse Scheduler benchmark result
          SCHEDULER_RESULT=$(grep "BenchmarkScheduler_CreateClaimComplete" benchmark-results.txt | head -1)
          if [ -n "$SCHEDULER_RESULT" ]; then
            echo "- **Scheduler Create→Claim→Complete**: $SCHEDULER_RESULT" >> $GITHUB_STEP_SUMMARY
          fi

          # Parse Sonic codec comparison
          SONIC_MARSHAL=$(grep "BenchmarkSonic_MarshalTask_Medium" benchmark-results.txt | head -1)
          STD_MARSHAL=$(grep "BenchmarkStdJSON_MarshalTask_Medium" benchmark-results.txt | head -1)
          if [ -n "$SONIC_MARSHAL" ] && [ -n "$STD_MARSHAL" ]; then
            echo "- **Sonic Marshal (medium)**: $SONIC_MARSHAL" >> $GITHUB_STEP_SUMMARY
            echo "- **StdJSON Marshal (medium)**: $STD_MARSHAL" >> $GITHUB_STEP_SUMMARY
          fi

          # Parse GC pressure
          GC_ENQUEUE=$(grep "BenchmarkGCPressure_SustainedEnqueue" benchmark-results.txt | head -1)
          if [ -n "$GC_ENQUEUE" ]; then
            echo "- **GC Pressure (Enqueue)**: $GC_ENQUEUE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for regressions (relative to main)
        if: github.event_name == 'pull_request'
        run: |
          echo "Fetching baseline benchmarks from main branch..."
          git fetch origin main:origin/main --depth=50 || true

          # Checkout main temporarily to get baseline
          git stash
          git checkout origin/main || git checkout main

          echo "Running baseline benchmarks on main..."
          go test -bench=. -benchmem -benchtime=10s -count=3 ./internal/bench > benchmark-baseline.txt 2>&1 || true

          # Return to PR branch
          git checkout -
          git stash pop || true

          echo "Comparing benchmarks..."
          echo "## Benchmark Regression Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Install benchstat for comparison
          go install golang.org/x/perf/cmd/benchstat@latest || true

          # Simple comparison - just flag if baseline exists
          if [ -f benchmark-baseline.txt ]; then
            echo "✅ Baseline benchmarks retrieved from main for comparison" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Use benchstat for statistical comparison if available
            if command -v benchstat &> /dev/null; then
              echo "### Statistical Comparison (benchstat)" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              benchstat benchmark-baseline.txt benchmark-results.txt >> $GITHUB_STEP_SUMMARY 2>&1 || true
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Note**: Performance regression detection is configured. Benchmarks should be reviewed for improvement or degradation." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Could not fetch baseline benchmarks from main" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.txt
            bloom-results.txt
            benchmark-baseline.txt
          retention-days: 90

      - name: Archive benchmark history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-history
          path: .benchmark-history/
          retention-days: 365
